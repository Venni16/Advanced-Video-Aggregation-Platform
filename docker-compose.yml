version: '3.9'

services:
  # ──────────────────────────────────────────
  # PostgreSQL Database
  # ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: tgvap_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tgvap}
      POSTGRES_USER: ${POSTGRES_USER:-tgvap_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-supersecret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tgvap_user} -d ${POSTGRES_DB:-tgvap}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────
  # Redis Cache & Queue
  # ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: tgvap_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────
  # Backend — Express.js API Gateway
  # ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tgvap_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-tgvap_user}:${POSTGRES_PASSWORD:-supersecret}@postgres:5432/${POSTGRES_DB:-tgvap}
      REDIS_URL: redis://redis:6379
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}
      CHANNEL_IDS: ${CHANNEL_IDS}
      YOUTUBE_MAX_RESULTS: ${YOUTUBE_MAX_RESULTS:-50}
      POLL_INTERVAL_MS: ${POLL_INTERVAL_MS:-900000}
      AI_SERVICE_URL: http://ai-service:8000
      JWT_SECRET: ${JWT_SECRET:-changeme_in_production}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3001/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ──────────────────────────────────────────
  # ML Microservice — FastAPI + CLIP
  # ──────────────────────────────────────────
  ai-service:
    build:
      context: ./AI_SERVICE
      dockerfile: Dockerfile
    container_name: tgvap_ai_service
    restart: unless-stopped
    environment:
      PORT: 8000
      MODEL_NAME: openai/clip-vit-base-patch32
      HF_HOME: /app/cache/huggingface
    volumes:
      - hf_cache:/app/cache/huggingface
    ports:
      - "8000:8000"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 60s

  # ──────────────────────────────────────────
  # Frontend — Vite build served by Nginx
  # ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_APP_TITLE: "TamilGaming.tv"
    container_name: tgvap_frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - ai-service
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  postgres_data:
  redis_data:
  hf_cache:


networks:
  default:
    name: tgvap_network
